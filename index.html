<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root { --mlb: #f2a900; --nba: #ff4d4d; --nhl: #00bcff; --bg: #030712; --card: #111827; --border: #1f2937; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; padding-bottom: 50px; }
        
        #lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .lock-box { background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid var(--border); width: 300px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        input { width: 100%; padding: 14px; margin: 20px 0; border-radius: 10px; border: 1px solid #374151; background: #000; color: #fff; box-sizing: border-box; text-align: center; font-size: 1.2rem; outline: none; }
        
        .main-app { display: none; }
        .header { text-align: center; padding: 25px 20px; background: linear-gradient(to bottom, #0f172a, #030712); border-bottom: 1px solid var(--border); }
        .search-bar { width: 90%; max-width: 450px; padding: 12px 25px; border-radius: 25px; border: 1px solid var(--border); background: #000; color: #fff; margin-top: 15px; outline: none; }
        
        .tabs { display: flex; justify-content: center; gap: 8px; padding: 12px; position: sticky; top: 0; background: rgba(3, 7, 18, 0.95); backdrop-filter: blur(15px); z-index: 100; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: var(--border); color: #9ca3af; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        
        .act-mlb { background: var(--mlb) !important; color: #000 !important; }
        .act-nba { background: var(--nba) !important; color: #fff !important; }
        .act-nhl { background: var(--nhl) !important; color: #fff !important; }

        .grid { display: none; padding: 20px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
        .is-active { display: grid !important; }

        .game-card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid var(--border); border-left: 6px solid transparent; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .b-mlb { border-left-color: var(--mlb); }
        .b-nba { border-left-color: var(--nba); }
        .b-nhl { border-left-color: var(--nhl); }

        .game-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; display: block; }
        .game-time { font-size: 0.85rem; color: #9ca3af; margin-bottom: 15px; display: block; }

        .btn-group { display: flex; gap: 10px; }
        .btn-opt { flex: 1; padding: 12px; border-radius: 8px; text-decoration: none; text-align: center; font-size: 0.75rem; font-weight: 800; color: #fff; background: #1f2937; border: 1px solid rgba(255,255,255,0.05); }

        .counter-v { text-align: center; padding: 20px; border-top: 1px solid var(--border); color: #4b5563; font-size: 0.8rem; }
        #v-num { color: var(--mlb); font-weight: bold; font-size: 1rem; }
    </style>
</head>

<div id="lock-screen">

        <button style="width: 100%; padding: 14px; background: var(--mlb); border: none; border-radius: 10px; font-weight: bold; cursor: pointer;" onclick="Vault.open()">ACCEDER</button>
    </div>
</div>

        <input type="text" id="s" class="search-bar" placeholder="🔍 Buscar equipos..." onkeyup="Vault.filter()">
    </header>

    <nav class="tabs">
        <button id="t-mlb" class="tab-btn act-mlb" onclick="Vault.tab('mlb')">MLB</button>
        <button id="t-nba" class="tab-btn" onclick="Vault.tab('nba')">NBA</button>
        <button id="t-nhl" class="tab-btn" onclick="Vault.tab('nhl')">NHL</button>

        <div id="g-nhl" class="grid"></div>

        VISITAS REGISTRADAS: <span id="v-num">0</span>
    </footer>
