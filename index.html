<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB PREMIUM TV</title>
    <style>
        :root {
            --mlb-blue: #002d62; --mlb-gold: #f2a900;
            --bg: #050a0f; --card: #101820; --text: #ffffff;
        }
        body, html { 
            margin: 0; padding: 0; min-height: 100%; 
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif;
        }
        #app { padding: 20px; max-width: 1200px; margin: 0 auto; text-align: center; }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid var(--mlb-blue); padding-bottom: 15px; margin-bottom: 20px;
        }
        .logo { font-size: 2em; font-weight: 900; color: var(--mlb-gold); }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px;
        }
        .btn-game {
            background: var(--card); border: 3px solid var(--mlb-blue);
            border-radius: 12px; padding: 25px; color: white;
            text-align: left; cursor: pointer; transition: 0.2s; outline: none;
            width: 100%;
        }
        .btn-game:focus, .btn-game:hover { 
            background: var(--mlb-gold); color: var(--mlb-blue); 
            transform: scale(1.03); border-color: white;
        }
        .game-title { font-size: 1.3em; font-weight: bold; display: block; }
        .game-info { font-size: 0.9em; opacity: 0.8; margin-top: 8px; display: block; }

        /* BOTÓN DE VOLVER FLOTANTE */
        #btn-volver {
            position: fixed; top: 10px; left: 10px;
            background: rgba(242, 169, 0, 0.9);
            color: #002d62; border: none; padding: 10px 20px;
            border-radius: 20px; font-weight: bold; font-size: 14px;
            z-index: 10000; cursor: pointer; display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<button id="btn-volver" onclick="regresar()">⬅ VOLVER A LA LISTA</button>

<div id="app">
    <header>
        <div class="logo">⚾ MLB PREMIUM</div>
    </header>

    <div class="grid">
        <button class="btn-game" onclick="ver('https://es8.sportplus.live/baseball/166775/7723186/')">
            <span class="game-title">Braves @ Athletics</span><span class="game-info">🕒 19:15 VZA</span>
        </button>
        <button class="btn-game" onclick="ver('https://es8.sportplus.live/baseball/166775/7723183/')">
            <span class="game-title">Cubs @ Angels</span><span class="game-info">🕒 19:40 VZA</span>
        </button>
        <button class="btn-game" onclick="ver('https://es8.sportplus.live/baseball/166775/7723200/')">
            <span class="game-title">Blue Jays @ Pirates</span><span class="game-info">Extra 5</span>
        </button>
    </div>
</div>

<script>
    function ver(url) {
        // Guardamos el estado en el historial para que el botón atrás funcione
        window.location.href = url;
    }

    function regresar() {
        window.location.href = "https://mchessbooks2025.github.io/mlb-app/";
    }

    // Si la URL no es la principal, mostramos el botón de volver
    if (window.location.href !== "https://mchessbooks2025.github.io/mlb-app/") {
        document.getElementById('btn-volver').style.display = 'block';
    }
</script>
</body>
</html>
