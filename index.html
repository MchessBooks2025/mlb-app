        /* Contenedor de Juegos */
        .section { display: none; padding: 12px; }
        .section.active { display: block; }

        /* Tarjeta de Juego Estilo Marcador */
        .game { background: #fff; border-radius: 8px; margin-bottom: 10px; border: 1px solid #e5e7eb; overflow: hidden; }

        .date { font-size: 0.65rem; color: #9ca3af; }
        
        .game-body { padding: 15px 12px; text-align: center; }
        .teams { font-size: 1rem; font-weight: 700; color: #111827; margin-bottom: 15px; }

        .btn { flex: 1; padding: 10px; border-radius: 6px; text-decoration: none; font-size: 0.7rem; font-weight: bold; text-align: center; }
        .btn-1 { background: #111827; color: #fff; }
