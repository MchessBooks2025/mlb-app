        /* LOGIN */
        #login-screen {

            align-items: center; justify-content: center; z-index: 10000;
        }

            background: var(--card); padding: 30px; border-radius: 15px;
            border: 1px solid var(--mlb-blue); text-align: center; width: 85%; max-width: 350px;
        }
        .login-box input {
            width: 90%; padding: 12px; margin: 20px 0; border-radius: 5px;
            border: 1px solid var(--mlb-blue); background: #1a242d; color: white;
            font-size: 1.1em; text-align: center; outline: none;
        }
        .btn-login {
            background: var(--mlb-gold); color: var(--mlb-blue);
            border: none; padding: 12px 30px; border-radius: 5px;
            font-weight: bold; cursor: pointer; width: 100%;
        }

        /* CONTENIDO PRINCIPAL */
        #app-content { display: none; padding: 15px; max-width: 1000px; margin: 0 auto; text-align: center; }
        
        header { margin-bottom: 20px; }
        .logo { font-size: 1.8em; font-weight: bold; color: var(--mlb-gold); text-transform: uppercase; }
        .vip-badge { color: red; font-size: 0.6em; vertical-align: super; margin-left: 5px; }
        .author-name { font-size: 0.8em; color: #888; margin-top: 5px; }

        /* CAJA DE DESCARGA ORIGINAL */
        .download-container {
            border: 1px solid var(--mlb-gold);
            border-radius: 15px;
            padding: 30px 15px;
            margin: 20px 0 35px 0;
            text-align: center;
        }
        .btn-download {
            background: var(--success); color: white; text-decoration: none;
            padding: 15px 40px; border-radius: 50px; font-weight: bold;
            display: inline-flex; align-items: center; gap: 10px;
            font-size: 1.1em;
        }
        .warning-text {
            font-size: 0.85em; color: var(--mlb-gold); margin-top: 15px;
            display: block;
        }

        /* GRID DE JUEGOS ORIGINAL */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 50px; }
        .btn-game {
            background: var(--card); border: 1px solid var(--mlb-blue);
            border-radius: 8px; padding: 18px; color: white;
            text-align: left; cursor: pointer; width: 100%; outline: none;
        }
        .btn-game:hover { background: #16212b; border-color: var(--mlb-gold); }
        .game-title { font-size: 1.1em; font-weight: bold; display: block; margin-bottom: 4px; }
        .game-time { font-size: 0.8em; color: #aaa; }

        /* MARCA DE AGUA */
        .footer-credits { font-size: 0.7em; color: #444; padding-bottom: 80px; letter-spacing: 1px; }
        .wpp-float { position: fixed; bottom: 25px; right: 25px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 999; }
    </style>

<script>
    const CLAVE_CORRECTA = "Promo";

    // Verifica si ya se logueó anteriormente
    window.onload = function() {
        if (localStorage.getItem('mlb_access') === 'true') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        }
    };

    function checkPass() {
        const input = document.getElementById('pass-input').value;
        if (input === CLAVE_CORRECTA) {
            localStorage.setItem('mlb_access', 'true');
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        } else {
            alert("Clave incorrecta");
        }
    }
