        .login-card h2 { color: var(--primary); margin-top: 0; letter-spacing: 2px; }
        input[type="password"] { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid #2d3748; background: #000; color: var(--primary); text-align: center; font-size: 1.2rem; outline: none; }
        
        .main-app { display: none; }
        .top-stats { background: #000; padding: 8px; text-align: center; font-size: 0.75rem; border-bottom: 1px solid var(--primary); color: #718096; position: sticky; top: 0; z-index: 1000; }
        #v-num { color: var(--primary); font-weight: bold; }

        header { padding: 20px; background: var(--card); border-bottom: 1px solid #2d3748; }
        .logo { font-size: 1.5rem; font-weight: 800; text-align: center; color: #fff; }
        .logo span { color: var(--primary); }

        .nav-tabs { display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: var(--bg); position: sticky; top: 35px; z-index: 999; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab { flex: 0 0 auto; padding: 12px 25px; border-radius: 12px; background: var(--card); border: 1px solid #2d3748; font-weight: 700; font-size: 0.8rem; cursor: pointer; color: #a0aec0; transition: 0.3s; }
        .tab.active { background: var(--primary); color: #000; border-color: var(--primary); transform: translateY(-2px); }

        .content { padding: 15px; display: none; grid-template-columns: 1fr; gap: 15px; }
        .content.active { display: grid; }
        .game-card { background: var(--card); border-radius: 16px; border: 1px solid #2d3748; padding: 20px; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .game-info { margin-bottom: 15px; border-left: 4px solid var(--color); padding-left: 15px; }
        .game-time { font-size: 0.75rem; color: #718096; display: block; margin-bottom: 4px; }
        .game-teams { font-size: 1.1rem; font-weight: 700; color: #fff; }

        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-link { padding: 12px; border-radius: 10px; text-decoration: none; text-align: center; font-size: 0.75rem; font-weight: 800; color: #fff; background: #2d3748; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
