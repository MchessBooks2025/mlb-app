    <title>MLB PREMIUM TV - Beta</title>
    <style>
        :root {
            --mlb-blue: #002d62; --mlb-gold: #f2a900;
            --bg: #050a0f; --card: #101820; --text: #ffffff;
            --success: #28a745;
        }
        body, html { 
            margin: 0; padding: 0; min-height: 100%; 
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif;
        }
        #app { padding: 15px; max-width: 1000px; margin: 0 auto; text-align: center; }
        
        header { border-bottom: 2px solid var(--mlb-blue); padding-bottom: 15px; margin-bottom: 20px; }
        .logo { font-size: 1.8em; font-weight: 900; color: var(--mlb-gold); }
        .beta { background: red; color: white; font-size: 0.5em; padding: 2px 8px; border-radius: 4px; vertical-align: middle; }

        .download-box {
            background: rgba(40, 167, 69, 0.1); border: 2px solid var(--success);
            padding: 20px; border-radius: 15px; margin-bottom: 25px;
        }
        .btn-download {
            background: var(--success); color: white; text-decoration: none;
            padding: 15px 30px; border-radius: 50px; font-weight: bold;
            display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* GRID CORREGIDO PARA MOSTRAR TODOS LOS JUEGOS */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 12px; 
            margin-bottom: 30px;
        }
        .btn-game {
            background: var(--card); border: 1px solid var(--mlb-blue);
            border-radius: 10px; padding: 18px; color: white;
            text-align: left; cursor: pointer; width: 100%; outline: none;
        }
        .btn-game:hover, .btn-game:active { background: var(--mlb-gold); color: var(--mlb-blue); }
        .game-title { font-size: 1.1em; font-weight: bold; display: block; }
        .game-info { font-size: 0.8em; opacity: 0.8; margin-top: 5px; display: block; }

        .footer { font-size: 0.8em; color: #666; margin-top: 20px; padding-bottom: 40px; }
    </style>
</head>
