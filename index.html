<!DOCTYPE html>

        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100%; overflow: hidden; }

        /* PANTALLA LOGIN */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--mlb-blue); text-align: center; width: 85%; max-width: 320px; }
        .login-box input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 5px; background: #1a242d; color: white; border: 1px solid var(--mlb-blue); text-align: center; font-size: 1.1em; outline: none; }
        .btn-login { background: var(--mlb-gold); color: var(--mlb-blue); border: none; padding: 12px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; }

        /* ESTRUCTURA PRINCIPAL */
        #app-content { display: none; flex-direction: column; height: 100vh; }

        /* VIDEO FIJO ARRIBA */
        #video-area { 
            width: 100%; 
            background: #000; 
            height: 230px; 
            border-bottom: 2px solid var(--mlb-gold);
            flex-shrink: 0;
            position: relative;
        }
        iframe, #placeholder { width: 100%; height: 100%; border: none; }
        #placeholder { display: flex; align-items: center; justify-content: center; color: #555; text-align: center; padding: 20px; font-size: 0.85em; flex-direction: column; }

        /* LISTA ABAJO CON SCROLL */
        .scroll-area { flex-grow: 1; overflow-y: auto; padding: 15px; text-align: center; -webkit-overflow-scrolling: touch; }
        
        .logo { font-size: 1.4em; font-weight: bold; color: var(--mlb-gold); margin-top: 5px; }
        .author { font-size: 0.75em; color: #888; margin-bottom: 15px; }

        .dl-card { border: 1px solid var(--mlb-gold); border-radius: 12px; padding: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.02); }
        .btn-dl { background: #28a745; color: white; text-decoration: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; display: inline-block; font-size: 0.85em; }
        .nav-txt { color: #00bcff; font-size: 0.75em; margin-top: 10px; display: block; font-weight: bold; }

        /* GRID DE JUEGOS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; padding-bottom: 80px; }
        .game-card { background: var(--card); border: 1px solid var(--mlb-blue); border-radius: 8px; padding: 12px; text-align: left; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--mlb-gold); background: #16212b; }
        .game-card b { display: block; font-size: 0.95em; margin-bottom: 3px; color: #fff; }
        .game-card span { font-size: 0.75em; color: var(--mlb-gold); font-weight: bold; }

        .footer-info { font-size: 0.7em; color: #444; padding-top: 20px; }
        .copyright { font-size: 0.7em; color: #333; font-weight: bold; padding-bottom: 40px; text-transform: uppercase; }
        
        .wpp { position: fixed; bottom: 20px; right: 20px; background: #25d366; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
