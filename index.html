<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP PRO v8.0 - Full Secure</title>
    <style>
        :root { --mlb: #f2a900; --nba: #ff4d4d; --nhl: #00bcff; --bg: #030712; --card: #111827; --border: #1f2937; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: system-ui, sans-serif; }
        
        /* SEGURIDAD: PANTALLA DE BLOQUEO */
        #lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .lock-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border); width: 280px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #374151; background: #000; color: #fff; box-sizing: border-box; text-align: center; font-size: 1.1rem; }
        .btn-access { width: 100%; padding: 12px; background: var(--mlb); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-access:active { transform: scale(0.95); }

        /* APP LAYOUT */
        .main-app { display: none; }
        .header { text-align: center; padding: 20px; background: #0f172a; border-bottom: 1px solid var(--border); }
        .search-bar { width: 85%; max-width: 400px; padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border); background: #000; color: #fff; margin-top: 10px; }
        
        .tabs { display: flex; justify-content: center; gap: 5px; padding: 10px; position: sticky; top: 0; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; border-radius: 8px; background: var(--border); color: #9ca3af; font-weight: bold; font-size: 0.7rem; cursor: pointer; }
        
        .act-mlb { background: var(--mlb) !important; color: #000 !important; }
        .act-nba { background: var(--nba) !important; color: #fff !important; }
        .act-nhl { background: var(--nhl) !important; color: #fff !important; }

        .grid { display: none; padding: 20px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .is-active { display: grid !important; }

        .game-card { background: var(--card); border-radius: 10px; padding: 18px; text-decoration: none; color: inherit; border: 1px solid var(--border); border-left: 6px solid transparent; transition: 0.2s; }
        .game-card:hover { background: #1e293b; transform: translateY(-3px); }
        .b-mlb { border-left-color: var(--mlb); }
        .b-nba { border-left-color: var(--nba); }
        .b-nhl { border-left-color: var(--nhl); }

        .nav-info { margin: 30px 20px; padding: 20px; border: 1px solid var(--nhl); border-radius: 12px; background: rgba(0,188,255,0.05); }
        .nav-info h4 { color: var(--nhl); margin: 0 0 10px 0; }
        .nav-info ul { margin: 0; padding-left: 20px; color: #9ca3af; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-box">
        <h2 style="color:var(--mlb); margin-top:0;">VIP ACCESS</h2>
        <input type="password" id="k" placeholder="CLAVE" autocomplete="off">
        <button class="btn-access" onclick="Vault.open()">ENTRAR</button>
    </div>
</div>

<div id="app-ui" class="main-app">
    <header class="header">
        <h1 style="margin:0; font-size:1.5rem;">SPORTS HUB <span style="color:var(--mlb)">PRO</span></h1>
        <input type="text" id="s" class="search-bar" placeholder="🔍 Buscar equipos..." onkeyup="Vault.filter()">
    </header>

    <nav class="tabs">
        <button id="t-mlb" class="tab-btn act-mlb" onclick="Vault.tab('mlb')">MLB</button>
        <button id="t-nba" class="tab-btn" onclick="Vault.tab('nba')">NBA</button>
        <button id="t-nhl" class="tab-btn" onclick="Vault.tab('nhl')">NHL</button>
    </nav>

    <main>
        <div id="g-mlb" class="grid is-active"></div>
        <div id="g-nba" class="grid"></div>
        <div id="g-nhl" class="grid"></div>
        
        <div class="nav-info">
            <h4>🧭 GUÍA RÁPIDA</h4>
            <ul>
                <li>Selecciona la liga en la barra superior.</li>
                <li>Usa el buscador para filtrar juegos específicos.</li>
                <li>Cada juego se abre en una pestaña segura e independiente.</li>
            </ul>
        </div>
    </main>
</div>

</body>
</html>
