<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB PREMIUM TV - Fase Beta</title>
    <style>
        :root {
            --mlb-blue: #002d62; --mlb-gold: #f2a900;
            --bg: #050a0f; --card: #101820; --text: #ffffff;
            --success: #28a745;
        }
        body, html { 
            margin: 0; padding: 0; min-height: 100%; 
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif;
        }
        #app { padding: 20px; max-width: 1200px; margin: 0 auto; text-align: center; }
        
        header { 
            display: flex; flex-direction: column; align-items: center; 
            border-bottom: 2px solid var(--mlb-blue); padding-bottom: 20px; margin-bottom: 25px;
        }
        .logo { font-size: 2.2em; font-weight: 900; color: var(--mlb-gold); text-transform: uppercase; }
        .beta-tag { background: red; color: white; font-size: 0.4em; padding: 2px 8px; border-radius: 4px; vertical-align: middle; margin-left: 10px; }

        .download-box {
            background: rgba(40, 167, 69, 0.1); border: 1px dashed var(--success);
            padding: 20px; border-radius: 15px; margin-bottom: 30px;
        }
        .btn-download {
            background: var(--success); color: white; text-decoration: none;
            padding: 15px 30px; border-radius: 50px; font-weight: bold;
            display: inline-block; transition: 0.3s;
        }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px;
        }
        .btn-game {
            background: var(--card); border: 2px solid var(--mlb-blue);
            border-radius: 12px; padding: 25px; color: white;
            text-align: left; cursor: pointer; width: 100%; outline: none;
        }
        .btn-game:focus, .btn-game:hover { 
            background: var(--mlb-gold); color: var(--mlb-blue); 
        }
        .game-title { font-size: 1.3em; font-weight: bold; display: block; }
        .game-info { font-size: 0.9em; opacity: 0.8; margin-top: 8px; display: block; }

        .instruccion {
            background: #333; color: #fff; padding: 10px; border-radius: 8px;
            margin-top: 20px; font-size: 0.9em;
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo">⚾ MLB PREMIUM <span class="beta-tag">BETA</span></div>
    </header>

    <div class="download-box">
        <a href="https://github.com/MchessBooks2025/mlb-app/raw/main/NOMBRE_DE_TU_ARCHIVO.apk" class="btn-download">
           📥 DESCARGAR APP (APK)
        </a>
    </div>

    <div class="grid">
        <button class="btn-game" onclick="window.location.href='https://es8.sportplus.live/baseball/166775/7723186/'">
            <span class="game-title">Braves @ Athletics</span><span class="game-info">🕒 19:15 VZA</span>
        </button>
        <button class="btn-game" onclick="window.location.href='https://es8.sportplus.live/baseball/166775/7723183/'">
            <span class="game-title">Cubs @ Angels</span><span class="game-info">🕒 19:40 VZA</span>
        </button>
        <button class="btn-game" onclick="window.location.href='https://es8.sportplus.live/baseball/166775/7723184/'">
            <span class="game-title">Brewers @ Rays</span><span class="game-info">🕒 19:40 VZA</span>
        </button>
        </div>

    <div class="instruccion">
        💡 <b>TIP:</b> Para cambiar de juego, usa el botón <b>ATRÁS</b> de tu control remoto o desliza para volver en tu móvil.
    </div>
</div>

</body>
</html>
