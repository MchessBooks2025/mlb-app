<!DOCTYPE html>

<head>

            --success: #28a745;

        body, html { 
            margin: 0; padding: 0; height: 100%;

            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* BLOQUEO VIP INMEDIATO */
        #login-screen {

            background: var(--card); padding: 30px; border-radius: 15px;

        }
        .login-box input {
            width: 90%; padding: 12px; margin: 20px 0; border-radius: 5px;
            border: 1px solid var(--mlb-blue); background: #1a242d; color: white;
            font-size: 1.1em; text-align: center; outline: none;
        }
        .btn-login {
            background: var(--mlb-gold); color: var(--mlb-blue);
            border: none; padding: 12px 30px; border-radius: 5px;
            font-weight: bold; cursor: pointer; width: 100%;
        }

        /* APP CONTENT */
        #app-content { display: none; padding: 15px; max-width: 1000px; margin: 0 auto; text-align: center; }
        
        header { margin-bottom: 20px; }
        .logo { font-size: 1.8em; font-weight: bold; color: var(--mlb-gold); text-transform: uppercase; }
        .vip-tag { color: red; font-size: 0.6em; vertical-align: super; }
        .author { font-size: 0.8em; color: #888; margin-top: 5px; }

        /* CAJA DE DESCARGA SEGÚN IMAGEN */
        .download-box {
            border: 1px solid var(--mlb-gold);
            border-radius: 15px;
            padding: 35px 15px;
            margin: 25px 0 40px 0;
            text-align: center;
        }
        .btn-dl {
            background: var(--success); color: white; text-decoration: none;
            padding: 15px 45px; border-radius: 50px; font-weight: bold;
            display: inline-flex; align-items: center; gap: 10px; font-size: 1.1em;
        }
        .dl-warning { font-size: 0.85em; color: var(--mlb-gold); margin-top: 15px; display: block; }

        /* GRID DE 15 JUEGOS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 60px; }
        .game-card {
            background: var(--card); border: 1px solid var(--mlb-blue);
            border-radius: 8px; padding: 18px; color: white;
            text-align: left; cursor: pointer; transition: 0.2s;
        }
        .game-card:hover { border-color: var(--mlb-gold); background: #16212b; }
        .game-card b { display: block; font-size: 1.1em; margin-bottom: 5px; }
        .game-card span { font-size: 0.85em; color: #aaa; }

        /* MARCA DE AGUA FINAL */
        .footer-info { font-size: 0.8em; color: #555; margin-bottom: 5px; }
        .watermark { font-size: 0.75em; color: #444; padding-bottom: 100px; letter-spacing: 1px; font-weight: bold; }
        
        .wpp { position: fixed; bottom: 25px; right: 25px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 999; }
    </style>
</head>
<body>

            btn.onclick = () => { window.location.href = `https://es8.sportplus.live/baseball/166775/${j.l}/`; };
            btn.innerHTML = `<b>${j.t}</b><span>🕒 ${j.h} VZA</span>`;

    checkMemory();

</html>
