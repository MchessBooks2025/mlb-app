<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP SPORTS PRO v9.1</title>
    <style>
        :root { --mlb: #f2a900; --nba: #ff4d4d; --nhl: #00bcff; --race: #10b981; --bg: #030712; --card: #111827; --border: #1f2937; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; padding-bottom: 80px; }
        
        #lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .lock-box { background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid var(--border); width: 300px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        input { width: 100%; padding: 14px; margin: 20px 0; border-radius: 10px; border: 1px solid #374151; background: #000; color: #fff; box-sizing: border-box; text-align: center; font-size: 1.2rem; outline: none; }
        
        .main-app { display: none; }
        .header { text-align: center; padding: 25px 20px; background: linear-gradient(to bottom, #0f172a, #030712); border-bottom: 1px solid var(--border); }
        .search-bar { width: 90%; max-width: 450px; padding: 12px 25px; border-radius: 25px; border: 1px solid var(--border); background: #000; color: #fff; margin-top: 15px; outline: none; }
        
        .tabs { display: flex; justify-content: center; gap: 5px; padding: 12px; position: sticky; top: 0; background: rgba(3, 7, 18, 0.95); backdrop-filter: blur(15px); z-index: 100; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 80px; padding: 12px 5px; border: none; border-radius: 10px; background: var(--border); color: #9ca3af; font-weight: bold; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        
        .act-mlb { background: var(--mlb) !important; color: #000 !important; }
        .act-nba { background: var(--nba) !important; color: #fff !important; }
        .act-nhl { background: var(--nhl) !important; color: #fff !important; }
        .act-hip { background: var(--race) !important; color: #fff !important; }

        .grid { display: none; padding: 20px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
        .is-active { display: grid !important; }

        .game-card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid var(--border); border-left: 6px solid transparent; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .b-mlb { border-left-color: var(--mlb); }
        .b-nba { border-left-color: var(--nba); }
        .b-nhl { border-left-color: var(--nhl); }
        .b-hip { border-left-color: var(--race); }

        .game-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; display: block; }
        .game-time { font-size: 0.85rem; color: #9ca3af; margin-bottom: 15px; display: block; }

        .btn-group { display: flex; gap: 10px; }
        .btn-opt { flex: 1; padding: 12px; border-radius: 8px; text-decoration: none; text-align: center; font-size: 0.75rem; font-weight: 800; color: #fff; background: #1f2937; border: 1px solid rgba(255,255,255,0.05); }

        .counter-v { position: fixed; bottom: 0; width: 100%; background: #000; text-align: center; padding: 15px; border-top: 1px solid var(--border); color: #9ca3af; font-size: 0.8rem; z-index: 200; }
        #v-num { color: var(--mlb); font-weight: bold; font-size: 1.1rem; margin-left: 5px; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-box">
        <h2 style="color:var(--mlb); margin:0; letter-spacing: 2px;">VIP SPORTS</h2>
        <input type="password" id="k" placeholder="••••••••" autocomplete="off">
        <button style="width: 100%; padding: 14px; background: var(--mlb); border: none; border-radius: 10px; font-weight: bold; cursor: pointer;" onclick="Vault.open()">DESBLOQUEAR</button>
    </div>
</div>

<div id="app-ui" class="main-app">
    <header class="header">
        <h1 style="margin:0; font-size:1.6rem;">SPORTS HUB <span style="color:var(--mlb)">PRO</span></h1>
        <input type="text" id="s" class="search-bar" placeholder="🔍 Buscar equipos o canales..." onkeyup="Vault.filter()">
    </header>

    <nav class="tabs">
        <button id="t-mlb" class="tab-btn act-mlb" onclick="Vault.tab('mlb')">MLB</button>
        <button id="t-nba" class="tab-btn" onclick="Vault.tab('nba')">NBA</button>
        <button id="t-nhl" class="tab-btn" onclick="Vault.tab('nhl')">NHL</button>
        <button id="t-hip" class="tab-btn" onclick="Vault.tab('hip')">HIPISMO</button>
    </nav>

    <main>
        <div id="g-mlb" class="grid is-active"></div>
        <div id="g-nba" class="grid"></div>
        <div id="g-nhl" class="grid"></div>
        <div id="g-hip" class="grid"></div>
    </main>

    <footer class="counter-v">
        📈 VISITAS AL SISTEMA: <span id="v-num">0</span>
    </footer>
</div>

            { t: "Suns @ Hornets", h: "19:00", u1: "aHR0cHM6Ly92Mi5zdHJlYW1lYXN0LnNrL25iYS9waG9lbml4LXN1bnMtdnMtY2hhcmxvdHRlLWhvcm5ldHMv", u2: "aHR0cHM6Ly9lczYuc3BvcnRwbHVzLmxpdmUvYmFza2V0YmFsbC9uYmEvNzczNDExNS8=" },

            { t: "Canadiens @ Rangers", h: "19:00", u1: "aHR0cHM6Ly92Mi5zdHJlYW1lYXN0LnNrL25obC9tb250cmVhbC1jYW5hZGllbnMtdnMtbmV3LXlvcmstcmFuZ2Vycy0xLz", u2: "aHR0cHM6Ly9lczYuc3BvcnRwbHVzLmxpdmUvaG9ja2V5L25obC83NzI4NDcyLw==" },

    const _render = () => {
        Object.keys(_D).forEach(l => {
            const container = document.getElementById(`g-${l}`);
            container.innerHTML = _D[l].map(g => `
                <div class="game-card b-${l}">
                    <div>
                        <span class="game-title">${g.t}</span>
                        <span class="game-time">🕒 ${g.h}</span>
                    </div>
                    <div class="btn-group">
                        <a href="javascript:void(0)" onclick="Vault.go('${g.u1}')" class="btn-opt" style="background:#2d3748">OPCIÓN 1</a>
                        <a href="javascript:void(0)" onclick="Vault.go('${g.u2}')" class="btn-opt" style="background:rgba(255,255,255,0.05)">OPCIÓN 2</a>
                    </div>
                </div>
            `).join('');
        });
    };

    const _counter = () => {
        let v = localStorage.getItem('visit_count') || 0;
        v++;
        localStorage.setItem('visit_count', v);
        document.getElementById('v-num').innerText = v;
    };

    return {
        init: () => {
            _render();
            if (sessionStorage.getItem(_S)) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app-ui').style.display = 'block';
                _counter();
            }
        },
        open: () => {
            if (btoa(document.getElementById('k').value) === _H) {
                sessionStorage.setItem(_S, "1");
                location.reload();
            } else { alert("Error de acceso"); }
        },
        go: (u) => { window.open(atob(u), '_blank'); },
        tab: (l) => {
            ['mlb','nba','nhl','hip'].forEach(x => {
                document.getElementById(`t-${x}`).className = 'tab-btn';
                document.getElementById(`g-${x}`).classList.remove('is-active');
            });
            document.getElementById(`t-${l}`).classList.add(`act-${l}`);
            document.getElementById(`g-${l}`).classList.add('is-active');
        },
        filter: () => {
            const q = document.getElementById('s').value.toLowerCase();
            const cards = document.querySelector('.grid.is-active').querySelectorAll('.game-card');
            cards.forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }
    };
})();
document.addEventListener('DOMContentLoaded', Vault.init);
</script>
</body>
</html>
