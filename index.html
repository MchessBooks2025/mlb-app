<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB PREMIUM TV - Fase Beta</title>
    <style>
        :root {
            --mlb-blue: #002d62; --mlb-gold: #f2a900;
            --bg: #050a0f; --card: #101820; --text: #ffffff;
            --success: #28a745;
        }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
        }
        #app { padding: 20px; max-width: 1200px; margin: 0 auto; text-align: center; }
        
        /* HEADER Y LOGO */
        header { 
            display: flex; flex-direction: column; align-items: center; 
            border-bottom: 2px solid var(--mlb-blue); padding-bottom: 20px; margin-bottom: 25px;
        }
        .logo { font-size: 2.2em; font-weight: 900; color: var(--mlb-gold); text-transform: uppercase; }
        .beta-tag { background: red; color: white; font-size: 0.4em; padding: 2px 8px; border-radius: 4px; vertical-align: middle; }

        /* SECCIÓN DE DESCARGA */
        .download-box {
            background: rgba(40, 167, 69, 0.1); border: 1px dashed var(--success);
            padding: 20px; border-radius: 15px; margin-bottom: 30px;
        }
        .btn-download {
            background: var(--success); color: white; text-decoration: none;
            padding: 18px 35px; border-radius: 50px; font-weight: bold;
            display: inline-block; font-size: 1.2em; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        }
        .btn-download:hover { transform: scale(1.05); background: #218838; }

        /* GRID DE JUEGOS */
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px; margin-top: 20px;
        }
        .btn-game {
            background: var(--card); border: 2px solid var(--mlb-blue);
            border-radius: 12px; padding: 25px; color: white;
            text-align: left; cursor: pointer; transition: 0.2s; outline: none;
        }
        .btn-game:focus, .btn-game:hover { 
            background: var(--mlb-gold); color: var(--mlb-blue); 
            transform: scale(1.03); border-color: white;
        }
        .game-title { font-size: 1.3em; font-weight: bold; display: block; }
        .game-info { font-size: 0.9em; opacity: 0.8; margin-top: 8px; display: block; }

        /* REPRODUCTOR CAPA SUPERIOR */
        #player-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
        }
        #btn-cerrar {
            position: absolute; top: 20px; left: 20px;
            background: var(--mlb-gold); color: var(--mlb-blue);
            border: none; padding: 15px 25px; border-radius: 50px;
            font-weight: bold; font-size: 1em; cursor: pointer;
            z-index: 10001; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        .footer { margin-top: 50px; color: #555; font-size: 0.9em; padding-bottom: 30px; }
    </style>
</head>
<body>

<div id="player-layer">
    <button id="btn-cerrar" onclick="cerrarVideo()">⬅ VOLVER A LA LISTA</button>
    <iframe id="video-frame" src="" allowfullscreen></iframe>
</div>

<div id="app">
    <header>
        <div class="logo">⚾ MLB PREMIUM <span class="beta-tag">BETA</span></div>
        <p style="color: #aaa; margin-top: 10px;">Análisis y Pruebas en Vivo</p>
    </header>

    <div class="download-box">
        <p style="margin-bottom: 15px; font-weight: bold;">¿Quieres la App en tu Smart TV?</p>
        <a href="https://github.com/MchessBooks2025/mlb-app/raw/main/NOMBRE_DE_TU_ARCHIVO.apk" class="btn-download">
           📥 DESCARGA DIRECTA (APK)
        </a>
        <p style="font-size: 0.8em; color: #888; margin-top: 12px;">
           Sin anuncios • Sin esperas • Instalación inmediata
        </p>
    </div>

    <div class="grid">
        <button class="btn-game" onclick="abrirVideo('https://es8.sportplus.live/baseball/166775/7723186/')">
            <span class="game-title">Braves @ Athletics</span><span class="game-info">🕒 19:15 VZA</span>
        </button>
        <button class="btn-game" onclick="abrirVideo('https://es8.sportplus.live/baseball/166775/7723183/')">
            <span class="game-title">Cubs @ Angels</span><span class="game-info">🕒 19:40 VZA</span>
        </button>
        </div>

    <div class="footer">
        <p>Reporta cualquier error al administrador para mejorar la App.</p>
        <p>© 2026 MLB Premium TV Community</p>
    </div>
</div>

<script>
    function abrirVideo(url) {
        document.getElementById('video-frame').src = url;
        document.getElementById('player-layer').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function cerrarVideo() {
        document.getElementById('player-layer').style.display = 'none';
        document.getElementById('video-frame').src = '';
        document.body.style.overflow = 'auto';
    }
</script>
</body>
</html>
